name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  VERSION: ${{ github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare example environment
        run: cp .env.example .env

      - name: Set build metadata
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Validate Docker Compose files
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.prod.yml config --quiet

      - name: PHP syntax lint
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace php:8.2-cli \
            sh -lc "find app gunslinger-api -name '*.php' -print0 | xargs -0 -n1 php -l"

      - name: Build app image
        run: |
          docker build \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg VERSION="${VERSION}" \
            -t sgr-ci-app .

      - name: Build DNS image
        run: |
          docker build \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg VERSION="${VERSION}" \
            -t sgr-ci-dns -f docker/dnsmasq/Dockerfile .

      - name: Scan app image
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: sgr-ci-app
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Scan DNS image
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: sgr-ci-dns
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
