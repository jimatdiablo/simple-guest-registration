name: Publish GHCR Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE_NAME: ${{ github.repository }}
  DNS_IMAGE_NAME: ${{ github.repository }}-dns
  VERSION: ${{ github.ref_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Build app image
        run: |
          docker build \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg VERSION="${VERSION}" \
            -t "${REGISTRY}/${APP_IMAGE_NAME}:sha-${GITHUB_SHA::7}" \
            -t sgr-publish-app-scan:local \
            .

      - name: Scan app image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --format table --severity CRITICAL,HIGH --exit-code 0 sgr-publish-app-scan:local

      - name: Build DNS image
        run: |
          docker build \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg VERSION="${VERSION}" \
            -t "${REGISTRY}/${DNS_IMAGE_NAME}:sha-${GITHUB_SHA::7}" \
            -t sgr-publish-dns-scan:local \
            -f docker/dnsmasq/Dockerfile .

      - name: Scan DNS image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --format table --severity CRITICAL,HIGH --exit-code 0 sgr-publish-dns-scan:local

      - name: Tag main images
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag "${REGISTRY}/${APP_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${APP_IMAGE_NAME}:main"
          docker tag "${REGISTRY}/${APP_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${APP_IMAGE_NAME}:latest"
          docker tag "${REGISTRY}/${DNS_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${DNS_IMAGE_NAME}:main"
          docker tag "${REGISTRY}/${DNS_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${DNS_IMAGE_NAME}:latest"

      - name: Tag version images
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION_TAG="${GITHUB_REF_NAME}"
          CLEAN_VERSION="${VERSION_TAG#v}"
          MAJOR="${CLEAN_VERSION%%.*}"
          MINOR="$(echo "${CLEAN_VERSION}" | awk -F. '{print $1 "." $2}')"
          docker tag "${REGISTRY}/${APP_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${APP_IMAGE_NAME}:${VERSION_TAG}"
          docker tag "${REGISTRY}/${APP_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${APP_IMAGE_NAME}:${CLEAN_VERSION}"
          docker tag "${REGISTRY}/${APP_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${APP_IMAGE_NAME}:${MINOR}"
          docker tag "${REGISTRY}/${APP_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${APP_IMAGE_NAME}:${MAJOR}"
          docker tag "${REGISTRY}/${DNS_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${DNS_IMAGE_NAME}:${VERSION_TAG}"
          docker tag "${REGISTRY}/${DNS_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${DNS_IMAGE_NAME}:${CLEAN_VERSION}"
          docker tag "${REGISTRY}/${DNS_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${DNS_IMAGE_NAME}:${MINOR}"
          docker tag "${REGISTRY}/${DNS_IMAGE_NAME}:sha-${GITHUB_SHA::7}" "${REGISTRY}/${DNS_IMAGE_NAME}:${MAJOR}"

      - name: Push images
        run: |
          docker push --all-tags "${REGISTRY}/${APP_IMAGE_NAME}"
          docker push --all-tags "${REGISTRY}/${DNS_IMAGE_NAME}"
